aid: argo-cd
name: Argo CD
description: >-
  Argo CD is a declarative, GitOps continuous delivery tool for Kubernetes that automates the
  deployment of applications by using Git repositories as the source of truth for defining the
  desired application state. It supports multiple config management tools (Helm, Kustomize,
  Jsonnet, plain YAML), multi-cluster deployments, RBAC, SSO integrations, and a fully-loaded
  web UI. Part of the CNCF ecosystem and the Argo Project, governed by the Linux Foundation.
