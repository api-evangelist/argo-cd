      path: /api/v1/projects
      operations:
      - name: projectservicelist
        method: GET
        description: Argo CD List Returns List of Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
      - name: projectservicecreate
        method: POST
        description: Argo CD Create a New Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          required: true
