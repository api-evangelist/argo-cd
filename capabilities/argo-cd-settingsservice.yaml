naftiko: 1.0.0-alpha2
info:
  label: Argo CD — SettingsService
  description: 'Argo CD — SettingsService. 2 operations. Lead operation: Argo CD Get Returns Argo CD Settings. Self-contained
    Naftiko capability covering one Argo Cd business surface.'
  tags:
  - Argo Cd
  - SettingsService
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARGO_CD_API_KEY: ARGO_CD_API_KEY
capability:
  consumes:
  - type: http
    namespace: argo-cd-settingsservice
    baseUri: ''
    description: Argo CD — SettingsService business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-settings
      path: /api/v1/settings
      operations:
      - name: settingsserviceget
        method: GET
        description: Argo CD Get Returns Argo CD Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-settings-plugins
      path: /api/v1/settings/plugins
      operations:
      - name: settingsservicegetplugins
        method: GET
        description: Argo CD Get Returns Argo CD Plugins
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: argo-cd-settingsservice-rest
    port: 8080
    description: REST adapter for Argo CD — SettingsService. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/settings
      name: api-v1-settings
      description: REST surface for api-v1-settings.
      operations:
      - method: GET
        name: settingsserviceget
        description: Argo CD Get Returns Argo CD Settings
        call: argo-cd-settingsservice.settingsserviceget
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/settings/plugins
      name: api-v1-settings-plugins
      description: REST surface for api-v1-settings-plugins.
      operations:
      - method: GET
        name: settingsservicegetplugins
        description: Argo CD Get Returns Argo CD Plugins
        call: argo-cd-settingsservice.settingsservicegetplugins
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: argo-cd-settingsservice-mcp
    port: 9090
    transport: http
    description: MCP adapter for Argo CD — SettingsService. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: argo-cd-get-returns-argo
      description: Argo CD Get Returns Argo CD Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: argo-cd-settingsservice.settingsserviceget
      outputParameters:
      - type: object
        mapping: $.
    - name: argo-cd-get-returns-argo-2
      description: Argo CD Get Returns Argo CD Plugins
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: argo-cd-settingsservice.settingsservicegetplugins
      outputParameters:
      - type: object
        mapping: $.
